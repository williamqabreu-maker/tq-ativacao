<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Tela Quente Ativação</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  p { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input[type=password]:focus { border-color: #333; }
  button { width: 100%; background: #111; color: #fff; border: none; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 1rem; }
  button:hover { background: #333; }
  .error { background: #fff0f0; border: 1px solid #fcc; color: #c00; font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; }
  .logo { font-size: 24px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔥</div>
  <h1>Tela Quente</h1>
  <p>Painel de ativação</p>
  <div id="err" class="error" style="display:none">Senha incorreta.</div>
  <form method="POST" action="/login">
    <div style="margin-bottom: 1rem;">
      <label>Senha</label>
      <input type="password" name="password" autofocus placeholder="••••••••" />
    </div>
    <button type="submit">Entrar</button>
  </form>
</div>
<script>
  if (location.search.includes('error')) document.getElementById('err').style.display = 'block';
</script>
</body>
</html>
